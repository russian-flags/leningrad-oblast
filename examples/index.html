<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@russian-flags/leningrad-oblast example</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23263438'/%3E%3Cpath d='M12 15h40v10H12z' fill='%23fff'/%3E%3Cpath d='M12 27h40v10H12z' fill='%232d5f93'/%3E%3Cpath d='M12 39h40v10H12z' fill='%239f3440'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="eyebrow">пример npm-пакета</p>
          <h1>Флаги Ленинградской области</h1>
        </div>
        <p id="summary" class="summary">Загрузка...</p>
      </header>

      <section class="table-wrap" aria-label="Список населённых пунктов">
        <table>
          <thead>
            <tr>
              <th>Населённый пункт</th>
              <th>Идентификатор</th>
              <th>Флаг</th>
              <th>Формат флага</th>
            </tr>
          </thead>
          <tbody id="flagsList">
            <tr>
              <td colspan="4" class="loading">Загрузка списка...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <dialog id="flagModal" class="flag-modal" aria-labelledby="flagModalTitle">
      <div class="flag-modal__top">
        <h2 id="flagModalTitle"></h2>
        <button class="flag-modal__close" type="button" aria-label="Закрыть">×</button>
      </div>
      <div class="flag-modal__image-frame">
        <img id="flagModalImage" alt="" />
      </div>
    </dialog>
  </body>
</html>
